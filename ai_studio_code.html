<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Cuánto cuesta? - Quiz de Precios Globales</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1D9E75;
            --primary-dark: #147a5b;
            --bg: #f4f7f6;
            --text: #1a1a1a;
            --white: #ffffff;
            --error: #e74c3c;
            --success: #2ecc71;
            --gray: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 640px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            overflow: hidden;
            position: relative;
        }

        h1, h2, h3 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Screen */
        .home-screen {
            text-align: center;
            padding: 40px 0;
        }

        .home-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 24px;
            width: 100%;
        }

        .btn-main:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Game UI Components */
        .progress-container {
            width: 100%;
            height: 8px;
            background: var(--gray);
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-card {
            text-align: center;
            margin-bottom: 30px;
        }

        .product-emoji {
            font-size: 70px;
            margin-bottom: 10px;
            display: inline-block;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .badges {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .badge-country { background: #f0f0f0; color: #555; }
        .badge-arg { background: #e3f2fd; color: #1976d2; border: 1px solid #bbdefb; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            background: var(--white);
            border: 2px solid var(--gray);
            padding: 18px 10px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f9fdfb;
        }

        .option-btn.correct {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .option-btn.incorrect {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        .feedback-area {
            min-height: 80px;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .fact-box {
            font-size: 0.9rem;
            font-style: italic;
            color: #666;
            margin-top: 10px;
            line-height: 1.4;
        }

        /* Results Screen */
        .results-screen {
            text-align: center;
        }

        .trophy {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
        }

        .stat-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #777;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
            #app { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Pantalla de Inicio -->
        <div id="home-screen" class="screen active">
            <span class="home-emoji">🌎</span>
            <h1>¿Cuánto cuesta?</h1>
            <p style="margin-top: 10px; color: #666;">¿Sabés cuánto valen las cosas fuera de Argentina? Poné a prueba tu noción de los precios mundiales.</p>
            <button class="btn-main" onclick="startGame()">¡Empezar Desafío!</button>
        </div>

        <!-- Pantalla de Juego -->
        <div id="game-screen" class="screen">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            
            <div class="question-card">
                <div id="product-emoji" class="product-emoji">🍎</div>
                <h2 id="product-name">Cargando...</h2>
                
                <div class="badges">
                    <span id="badge-country" class="badge badge-country">País: ---</span>
                    <span id="badge-arg" class="badge badge-arg">En Argentina: ---</span>
                </div>
                
                <p style="margin-bottom: 20px; font-weight: 500;">¿Cuál es el precio en este país?</p>
                
                <div id="options-grid" class="options-grid">
                    <!-- Botones de opciones generados por JS -->
                </div>

                <div id="feedback-area" class="feedback-area">
                    <strong id="result-text"></strong>
                    <p id="fact-box" class="fact-box"></p>
                    <button class="btn-main" onclick="nextQuestion()" style="margin-top: 15px;">Siguiente</button>
                </div>
            </div>
        </div>

        <!-- Pantalla de Resultados -->
        <div id="results-screen" class="screen">
            <div id="trophy-icon" class="trophy">🏆</div>
            <h2 id="result-title">¡Juego Terminado!</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span id="final-score" class="stat-value">0</span>
                    <span class="stat-label">Puntos</span>
                </div>
                <div class="stat-card">
                    <span id="final-accuracy" class="stat-value">0%</span>
                    <span class="stat-label">Aciertos</span>
                </div>
                <div class="stat-card">
                    <span id="final-correct" class="stat-value" style="color: var(--success)">0</span>
                    <span class="stat-label">Correctas</span>
                </div>
                <div class="stat-card">
                    <span id="final-incorrect" class="stat-value" style="color: var(--error)">0</span>
                    <span class="stat-label">Incorrectas</span>
                </div>
            </div>
            
            <button class="btn-main" onclick="location.reload()">Jugar de nuevo</button>
        </div>
    </div>

    <script>
        const questionPool = [
            {
                product: "Leche (1L)", emoji: "🥛", country: "Noruega", 
                argPrice: "$1.200 (USD 1.20)", 
                options: ["USD 1.10", "USD 2.25", "USD 0.80", "USD 3.50"],
                correct: 1, 
                fact: "Noruega tiene uno de los costos de vida más altos; los lácteos tienen altos impuestos para proteger al productor local."
            },
            {
                product: "Pan de molde", emoji: "🍞", country: "Suiza", 
                argPrice: "$2.500 (USD 2.50)", 
                options: ["USD 1.50", "USD 2.20", "USD 3.80", "USD 6.00"],
                correct: 2, 
                fact: "En Suiza, la comida es un 70% más cara que la media europea."
            },
            {
                product: "Café Espresso", emoji: "☕", country: "Italia", 
                argPrice: "$2.000 (USD 2.00)", 
                options: ["USD 1.30", "USD 4.50", "USD 3.00", "USD 0.50"],
                correct: 0, 
                fact: "En Italia, el precio del café en la barra está regulado socialmente y es más barato que en Buenos Aires."
            },
            {
                product: "Nafta (1L)", emoji: "⛽", country: "Venezuela", 
                argPrice: "$950 (USD 0.95)", 
                options: ["USD 1.20", "USD 0.03", "USD 0.50", "USD 2.10"],
                correct: 1, 
                fact: "Históricamente, Venezuela ha tenido la nafta más barata del mundo gracias a subsidios masivos."
            },
            {
                product: "Cerveza (Pinta)", emoji: "🍺", country: "Dinamarca", 
                argPrice: "$3.500 (USD 3.50)", 
                options: ["USD 2.00", "USD 4.00", "USD 7.50", "USD 12.00"],
                correct: 2, 
                fact: "En Copenhague, una cerveza en un bar promedio ronda los 7-8 dólares."
            },
            {
                product: "Huevos (12u)", emoji: "🥚", country: "Japón", 
                argPrice: "$2.200 (USD 2.20)", 
                options: ["USD 1.50", "USD 2.60", "USD 5.00", "USD 0.90"],
                correct: 1, 
                fact: "Japón consume muchísimos huevos y su precio es bastante estable y competitivo."
            },
            {
                product: "Taxi (5km)", emoji: "🚕", country: "Singapur", 
                argPrice: "$4.500 (USD 4.50)", 
                options: ["USD 4.00", "USD 12.00", "USD 25.00", "USD 8.50"],
                correct: 3, 
                fact: "A diferencia de otras ciudades globales, los taxis en Singapur son relativamente eficientes y no tan costosos."
            },
            {
                product: "Corte de pelo (Hombre)", emoji: "💇‍♂️", country: "EE.UU.", 
                argPrice: "$8.000 (USD 8.00)", 
                options: ["USD 10.00", "USD 15.00", "USD 35.00", "USD 60.00"],
                correct: 2, 
                fact: "En ciudades de EE.UU., un corte básico con propina rara vez baja de los 30-35 dólares."
            },
            {
                product: "Pizza Margherita", emoji: "🍕", country: "Australia", 
                argPrice: "$10.000 (USD 10.00)", 
                options: ["USD 18.00", "USD 8.00", "USD 5.00", "USD 12.00"],
                correct: 0, 
                fact: "Australia tiene salarios mínimos muy altos, lo que encarece mucho el servicio de gastronomía."
            },
            {
                product: "Queso Gouda (1kg)", emoji: "🧀", country: "Países Bajos", 
                argPrice: "$11.000 (USD 11.00)", 
                options: ["USD 20.00", "USD 12.00", "USD 5.00", "USD 30.00"],
                correct: 1, 
                fact: "Al ser grandes productores mundiales, el queso de calidad es más accesible que en Argentina."
            },
            {
                product: "Viaje en Subte", emoji: "🚇", country: "Londres", 
                argPrice: "$750 (USD 0.75)", 
                options: ["USD 1.50", "USD 4.20", "USD 0.90", "USD 2.50"],
                correct: 1, 
                fact: "El 'Tube' de Londres es uno de los transportes más caros del mundo por tramo."
            },
            {
                product: "Pimiento/Morrón (1kg)", emoji: "🫑", country: "México", 
                argPrice: "$4.000 (USD 4.00)", 
                options: ["USD 1.80", "USD 4.50", "USD 6.00", "USD 0.50"],
                correct: 0, 
                fact: "En México, la gran producción local hace que los vegetales frescos sean mucho más económicos."
            }
        ];

        let selectedQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let canAnswer = true;

        function startGame() {
            // Mezclar y elegir 8 preguntas
            selectedQuestions = [...questionPool]
                .sort(() => Math.random() - 0.5)
                .slice(0, 8);
            
            currentIdx = 0;
            score = 0;
            correctCount = 0;
            incorrectCount = 0;
            
            showScreen('game-screen');
            renderQuestion();
        }

        function renderQuestion() {
            canAnswer = true;
            const q = selectedQuestions[currentIdx];
            
            // Actualizar UI
            document.getElementById('progress-bar').style.width = `${(currentIdx / 8) * 100}%`;
            document.getElementById('product-emoji').textContent = q.emoji;
            document.getElementById('product-name').textContent = q.product;
            document.getElementById('badge-country').textContent = `País: ${q.country}`;
            document.getElementById('badge-arg').textContent = `En Argentina: ${q.argPrice}`;
            
            // Reiniciar emoji animation
            const emojiEl = document.getElementById('product-emoji');
            emojiEl.style.animation = 'none';
            emojiEl.offsetHeight; // trigger reflow
            emojiEl.style.animation = null;

            // Renderizar opciones
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            document.getElementById('feedback-area').style.display = 'none';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(index);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            if (!canAnswer) return;
            canAnswer = false;
            
            const q = selectedQuestions[currentIdx];
            const buttons = document.querySelectorAll('.option-btn');
            const feedbackArea = document.getElementById('feedback-area');
            const resultText = document.getElementById('result-text');
            const factBox = document.getElementById('fact-box');

            if (selected === q.correct) {
                buttons[selected].classList.add('correct');
                score += 100;
                correctCount++;
                resultText.textContent = "¡Correcto! 🎉";
                resultText.style.color = "var(--success)";
            } else {
                buttons[selected].classList.add('incorrect');
                buttons[q.correct].classList.add('correct');
                incorrectCount++;
                resultText.textContent = `Incorrecto... Era ${q.options[q.correct]}`;
                resultText.style.color = "var(--error)";
            }

            factBox.textContent = q.fact;
            feedbackArea.style.display = 'block';
            
            // Scroll suave hacia abajo para ver el feedback en mobile
            setTimeout(() => {
                feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 8) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            showScreen('results-screen');
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-correct').textContent = correctCount;
            document.getElementById('final-incorrect').textContent = incorrectCount;
            
            const accuracy = Math.round((correctCount / 8) * 100);
            document.getElementById('final-accuracy').textContent = `${accuracy}%`;
            
            const trophy = document.getElementById('trophy-icon');
            if (accuracy === 100) trophy.textContent = "👑";
            else if (accuracy >= 70) trophy.textContent = "🏆";
            else if (accuracy >= 40) trophy.textContent = "🥈";
            else trophy.textContent = "😅";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
